<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>{% block title %}LUCYA.SYSTEMS GALLERY{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo/lucya_logo.svg">
  <link rel="stylesheet" href="{{ static_url('style.css') }}">

  {% block meta %}
  <meta property="og:site_name" content="lucya.systems gallery">
  <meta property="og:title" content="lucya.systems / gallery">
  <meta property="og:description" content="Personal photo archive.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ public_base_url(request) }}{{ request.url.path }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="lucya.systems / gallery">
  <meta name="twitter:description" content="Personal photo archive.">
  <meta name="theme-color" content="#5b8aff">
  {% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <!-- Fixed site backdrop as a single real element (NOT body::before/::after):
       iOS Safari mispositions fixed *pseudo-elements* of the flex <body> during
       scroll, so the grid + wallpaper are painted here instead and stay pinned.
       The ambient video is opt-in: app.js only loads/plays it on capable, large
       screens; low-end / mobile / reduced-motion / data-saver users keep the
       static poster + gradient and never fetch the 6 MB clip. -->
  <div class="site-bg" aria-hidden="true">
    <video class="bg-video" autoplay muted loop playsinline preload="none"
           data-bg-video data-src="/static/bg.mp4"></video>
  </div>
  <nav class="nav">
    <div class="nav__inner">
      <a href="/" class="nav__brand" aria-label="lucya.systems gallery">
        <img src="/static/logo/lucya_logo.svg" alt="">
        <span class="brand-text">
          <span class="brand-name">lucya.systems</span>
          <span class="brand-sub">/ gallery</span>
        </span>
        <span class="jp">画像庫</span>
      </a>
      <form action="/search" method="get" class="nav__search" role="search">
        <input type="search" name="q" placeholder="Search / album, file, tag" value="{{ query or '' }}" autocomplete="off">
      </form>
      <div class="nav__status">
        <span class="dot"></span>
        <span>ONLINE</span>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    <div class="foot__inner">
      <div class="foot__brand">
        <img src="/static/logo/lucya_logo.svg" alt="">
        <span>lucya.systems / gallery</span>
      </div>
      <div class="foot__links">
        <a href="https://lucya.sh/privacy" target="_blank" rel="noopener">Privacy</a>
        <a href="https://lucya.sh" target="_blank" rel="noopener">lucya.sh ↗</a>
      </div>
      <div class="foot__badges">
        <img src="/static/badges/eu.gif" width="88" height="31" alt="European Union" title="European Union">
        <img src="/static/badges/pride.png" width="88" height="31" alt="Progress Pride flag" title="Progress Pride">
      </div>
      <div class="foot__meta">
        <b>SIG</b> / LUCYA.GALLERY &nbsp;·&nbsp; <b>BUILD</b> / READONLY
      </div>
    </div>
  </footer>
  <script src="{{ static_url('app.js') }}"></script>
</body>
</html>
