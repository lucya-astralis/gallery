services:
  gallery:
    build: .
    container_name: imageslucya
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ${PHOTOS_PATH:-./photos}:/photos
      - ${THUMBS_PATH:-./thumbnails}:/thumbnails
      - ${PREVIEWS_PATH:-./previews}:/previews
      - ${DATA_PATH:-./data}:/data
    environment:
      - PHOTOS_DIR=/photos
      - THUMBS_DIR=/thumbnails
      - PREVIEWS_DIR=/previews
      - DATA_DIR=/data
      - THUMB_SIZE=${THUMB_SIZE:-480}
      - PREVIEW_SIZE=${PREVIEW_SIZE:-1600}
      - SCAN_INTERVAL=${SCAN_INTERVAL:-0}
      - ENABLE_WATCHER=${ENABLE_WATCHER:-1}
      - HIDE_GPS=${HIDE_GPS:-1}
      - STRIP_GPS=${STRIP_GPS:-1}
      # Public base URL used for OG / Twitter link previews.
      # Set this when behind a reverse proxy that terminates TLS,
      # e.g. PUBLIC_BASE_URL=https://gallery.lucya.systems
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
    restart: unless-stopped
